<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Our Family</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

.section {
    padding: 40px;
}

.gallery {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
}

.item img,
.item video {
    width: 300px;
    height: 300px;
    object-fit: cover;
    border-radius: 20px;
}

</style>
</head>

<body>

<h1>OUR FAMILY</h1>
<p>Kumpulan kenangan kita ✨</p>

<section class="section">
    <h2>Galeri</h2>

    <div class="gallery">

        <div class="item">
            <img src="foto1.jpg">
        </div>

        <div class="item">
            <video controls>
                <source src="video1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="item">
            <video controls>
                <source src="video2.mp4" type="video/mp4">
            </video>
        </div>

    </div>

</section>

</body>
</html>
